version: 2

models:
  - name: stg_basket_details
    description: >
      Cleaned and standardised basket transaction data.
      One row represents a single product purchased by a customer on a given date.
      Includes a surrogate basket_id generated from customer_id + product_id + basket_date.
    columns:
      - name: basket_id
        description: "Surrogate key: hash of customer_id + product_id + basket_date"
        tests:
          - unique
          - not_null
      - name: customer_id
        description: "Foreign key to stg_customer_details"
        tests:
          - not_null
      - name: product_id
        description: "Unique product identifier"
        tests:
          - not_null
      - name: basket_date
        description: "Date of purchase (DATE type)"
        tests:
          - not_null
      - name: basket_count
        description: "Number of items purchased for this product"
        tests:
          - not_null

  - name: stg_customer_details
    description: >
      Cleaned customer demographic data. Ages outside 18–100 are nulled.
      Gender values are normalised. GDPR-deleted customers are flagged.
      Age bands and tenure segments added for downstream segmentation.
    columns:
      - name: customer_id
        description: "Primary key — unique customer identifier"
        tests:
          - unique
          - not_null
      - name: gender
        description: "Normalised gender: Male, Female, Unknown, or GDPR_Deleted"
        tests:
          - not_null
          - accepted_values:
              values: ['Male', 'Female', 'Unknown', 'GDPR_Deleted']
      - name: is_gdpr_deleted
        description: "True if customer requested data deletion (kvkktalepsilindi)"
        tests:
          - not_null
      - name: customer_age
        description: "Age in years (NULL if outside 18–100 range)"
      - name: age_band
        description: "Age bracket: 18-24, 25-34, 35-44, 45-54, 55-64, 65+, Unknown"
      - name: tenure_days
        description: "Days since customer first registered"
        tests:
          - not_null
      - name: tenure_segment
        description: "Tenure bucket: New, Growing, Established, Loyal"
